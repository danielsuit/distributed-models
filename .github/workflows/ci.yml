name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: cargo fmt + clippy + test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      REDIS_URL: redis://127.0.0.1:6379/

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all-targets --locked

      - name: Run tests
        run: cargo test --all-targets --locked

  editor-lint:
    name: editor overlay tsc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # We don't compile the overlay standalone (it depends on a vscode-oss
      # checkout). This step just confirms the .ts files parse so silly
      # syntax mistakes get caught before someone runs apply.sh.
      - name: Syntax-only TypeScript check
        run: |
          npx --yes -p typescript@5.4 tsc \
            --noEmit \
            --target es2022 \
            --module esnext \
            --moduleResolution node \
            --skipLibCheck \
            --noResolve \
            --isolatedModules \
            $(find editor/src -name '*.ts')
